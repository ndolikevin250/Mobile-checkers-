<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Single Player Checkers</title>
    <link rel="stylesheet" href="single-player.css">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <!-- Profile Icon -->
    <div class="profile-icon" id="profileIcon" onclick="openUserDashboard()" title="User Dashboard">
        👤
    </div>

    <!-- Matrix Rain Background Animation - Full Viewport -->
    <canvas id="matrix-canvas" class="matrix-canvas"></canvas>

    <div class="game-container">
        <div class="board-wrapper">
            <div id="board" class="board">
                <!-- Board cells will be generated by JavaScript -->
            </div>
        </div>
        <div class="theme-selector">
            <label for="singlePlayerThemeSelect">Theme:</label>
            <select id="singlePlayerThemeSelect" class="theme-dropdown" onchange="changeTheme(this.value)">
                <option value="default">Default</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="classic">Classic</option>
                <option value="neon">Neon</option>
                <option value="forest">Forest</option>
                <option value="ice">Ice</option>
                <option value="fire">Fire</option>
            </select>
        </div>

        <div class="controls">
            <button class="btn" onclick="restartGame()">Restart</button>
            <button class="btn" onclick="openSettings()">Settings</button>
            <button class="btn" id="soundToggle" onclick="toggleSound()">🔊 Sound</button>
            <button class="btn" onclick="goToMenu()">Menu</button>
        </div>

        <!-- AI Thinking Indicator - Always Visible -->
        <div class="ai-thinking" id="aiThinking">
            <div class="ai-thinking-content">
                <div class="ai-thinking-title">AI Status</div>
                <div class="ai-thinking-status" id="aiThinkingStatus">Ready</div>
                <div class="ai-thinking-depth" id="aiThinkingDepth">Depth: 4</div>
                <div class="ai-thinking-confidence" id="aiThinkingConfidence">Confidence: Ready</div>
            </div>
        </div>

        <!-- User Dashboard Modal -->
        <div id="userDashboardModal" class="modal hidden">
            <div class="modal-content dashboard-modal">
                <div class="dashboard-header">
                    <h2>User Dashboard</h2>
                    <span class="close-btn" onclick="closeUserDashboard()">×</span>
                </div>
                <div class="dashboard-content">
                    <div class="user-info" id="userInfo">
                        <!-- User information will be loaded here -->
                    </div>
                    <div class="dashboard-stats" id="dashboardStats">
                        <!-- Dashboard statistics will be loaded here -->
                    </div>
                    <div class="dashboard-actions">
                        <button class="btn" onclick="exportUserData()">Export Data</button>
                        <button class="btn" onclick="clearUserData()">Clear Data</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <h2>Game Settings</h2>
                <div class="settings-section">
                    <h3>AI Difficulty</h3>
                    <div class="difficulty-options">
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="easy" id="easyMode">
                            <div class="difficulty-card">
                                <h4>Easy</h4>
                                <p>Perfect for beginners. AI makes obvious mistakes and focuses on basic captures.</p>
                            </div>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="medium" id="mediumMode" checked>
                            <div class="difficulty-card">
                                <h4>Medium</h4>
                                <p>Balanced challenge. AI uses learned patterns and strategic thinking.</p>
                            </div>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="hard" id="hardMode">
                            <div class="difficulty-card">
                                <h4>Hard</h4>
                                <p>Expert level. AI thinks deeply and rarely makes mistakes.</p>
                            </div>
                        </label>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button class="btn" onclick="saveSettings()">Save Settings</button>
                    <button class="btn" onclick="closeSettings()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Enhanced end game modal with animations -->
    <div class="end-game-modal hidden" id="endGameModal">
        <div class="modal-overlay"></div>
        <div class="modal-content victory-modal">
            <!-- Victory Effects -->
            <div class="victory-effects" id="victoryEffects">
                <div class="trophy">🏆</div>
                <div class="fireworks-container" id="fireworksContainer">
                    <!-- Fireworks will be generated here -->
                </div>
            </div>

            <!-- Defeat Effects -->
            <div class="defeat-effects" id="defeatEffects">
                <div class="skull">💀</div>
                <div class="lightning-container" id="lightningContainer">
                    <!-- Lightning effects will be generated here -->
                </div>
            </div>

            <!-- Main Content -->
            <div class="game-result-content">
                <h1 id="winner-text" class="result-title"></h1>
                <div class="result-stats" id="resultStats">
                    <!-- Game statistics will be shown here -->
                </div>
            <div class="modal-buttons">
                <button class="btn victory-btn" onclick="restartGame()">🎮 Play Again</button>
                <button class="btn defeat-btn" onclick="goToMenu()">🏠 Menu</button>
            </div>
        </div>
    </div>

    </div>

    <script src="matrix-rain.js"></script>
    <script src="sound-manager.js"></script>
    <script src="single-player.js"></script>
    <script src="mobile-touch.js"></script>
</body>
</html>
